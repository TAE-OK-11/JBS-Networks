name: JBS-LiteLLM-Extreme-Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'litellm/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. user의 인프라 레포지토리 복제 (커스텀 Dockerfile 가져오기)
      - name: Checkout Custom Infra Repo
        uses: actions/checkout@v4
        with:
          path: custom-repo

      # 2. LiteLLM 공식 레포지토리 복제 (최신 소스 및 requirements.txt 확보)
      - name: Checkout LiteLLM Official Source
        uses: actions/checkout@v4
        with:
          repository: BerriAI/litellm
          path: litellm-src
          # 특정 버전 고정이 필요하다면 아래 주석 해제 후 버전 명시
          # ref: v1.34.0 

      - name: Prepare LiteLLM Build Context
        run: |
          set -euxo pipefail
          # upstream .dockerignore 변경으로 manifest가 제외되는 이슈만 보완 (전체 삭제는 보안/크기 측면에서 비권장)
          touch litellm-src/.dockerignore
          cat <<'EOF' >> litellm-src/.dockerignore
          !requirements.txt
          !requirements/proxy.txt
          !pyproject.toml
          EOF
          ls -la litellm-src | head -n 80
          test -f litellm-src/requirements.txt || \
          test -f litellm-src/requirements/proxy.txt || \
          test -f litellm-src/pyproject.toml

      # 3. 공식 소스 디렉토리 내의 원본 Dockerfile을 커스텀 Dockerfile로 덮어쓰기
      - name: Inject Custom Dockerfile
        run: cp custom-repo/litellm/Dockerfile litellm-src/Dockerfile

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # 4. 빌드 컨텍스트를 커스텀 Dockerfile이 덮어씌워진 공식 소스 폴더로 지정
          context: ./litellm-src
          file: ./litellm-src/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jbs-litellm:extreme-4.3
