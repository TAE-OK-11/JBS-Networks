name: JBS-Jellyfin-Ultra-Build

on:
  push:
    branches: ["main"]
    paths:
      - "jellyfin/**"
      - ".github/workflows/build-jellyfin.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Jellyfin Image
        uses: docker/build-push-action@v6
        with:
          context: ./jellyfin
          file: ./jellyfin/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jbs-jellyfin:ultra
            ${{ secrets.DOCKER_USERNAME }}/jbs-jellyfin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          {
            echo "### JBS Jellyfin Ultra Build"
            echo ""
            echo "- **Image**: \`${{ secrets.DOCKER_USERNAME }}/jbs-jellyfin\`"
            echo "- **Tags**: \`ultra\`, \`latest\`"
            echo "- **Platform**: \`linux/amd64\`"
            echo "- **Dockerfile**: \`jellyfin/Dockerfile\`"
          } >> "$GITHUB_STEP_SUMMARY"
