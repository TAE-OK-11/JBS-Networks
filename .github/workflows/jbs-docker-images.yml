name: JBS Docker Images

on:
  push:
    branches: ["main"]
    paths:
      - "nginx/**"
      - "navidrome/**"
      - "compose.yaml"
      - ".github/workflows/jbs-docker-images.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - nginx
          - navidrome

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
            image: jbs-nginx
          - service: navidrome
            context: ./navidrome
            dockerfile: ./navidrome/Dockerfile
            image: jbs-navidrome

    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == matrix.service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            NAVIDROME_BUILD_CORES=2
            FFMPEG_THREADS=2
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
