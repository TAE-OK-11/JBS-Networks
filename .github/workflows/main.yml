name: JBS-Nginx-Ultra-Build

on:
  push:
    branches: [ "main" ]
    # 1. nginx 폴더 내의 파일이 push될 때만 이 액션이 실행되도록 제한합니다.
    paths:
      - 'nginx/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # 2. 빌드할 Dockerfile이 들어있는 폴더 경로를 지정합니다.
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jbs-nginx:ultra-4.0
