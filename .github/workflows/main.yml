name: JBS-Nginx-Ultra-Build

on:
  push:
    branches: ["main"]
    paths:
      - "nginx/**"
      - ".github/workflows/jbs-nginx-ultra-build.yml"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force full rebuild (bypass cache)"
        type: boolean
        default: false

concurrency:
  group: jbs-nginx-ultra-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jbs-nginx
  DOCKER_BUILD_RECORD_UPLOAD: false
  DOCKER_BUILD_SUMMARY: true

jobs:
  build:
    name: Build and Push JBS NGINX
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute cache bust
        id: cache_key
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "bust=$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "bust=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ultra-5.2-resource-aware,enable={{is_default_branch}}
            type=raw,value=ultra-4.0,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=JBS NGINX Ultra
            org.opencontainers.image.description=JBS Networks NGINX Ultra Resource-Aware Build
            org.opencontainers.image.vendor=JBS Networks
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          platforms: linux/amd64

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            JBS_NGINX_WORKER_PROCESSES=auto
            JBS_NGINX_WORKER_PROCESSES_MAX=8
            JBS_USE_JEMALLOC=true
            JBS_NGINX_CACHEBUST=${{ steps.cache_key.outputs.bust }}
            JBS_NGINX_BUILD_CORES=4

          cache-from: |
            type=gha,scope=jbs-nginx-ultra-amd64
          cache-to: |
            type=gha,mode=max,scope=jbs-nginx-ultra-amd64,ignore-error=true

          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild }}
          pull: true
          provenance: false
          sbom: false

      - name: Image digest summary
        shell: bash
        run: |
          echo "### 🐳 JBS NGINX Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
