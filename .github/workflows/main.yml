name: JBS-Nginx-Ultra-Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "nginx/**"
      - ".github/workflows/jbs-nginx-ultra-build.yml"
  workflow_dispatch:

concurrency:
  group: jbs-nginx-ultra-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jbs-nginx
  DOCKER_BUILD_RECORD_UPLOAD: false
  DOCKER_BUILD_SUMMARY: true

jobs:
  build:
    name: Build and Push JBS NGINX
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ultra-4.0,enable={{is_default_branch}}
            type=raw,value=ultra-5.2-resource-aware,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=JBS NGINX Ultra
            org.opencontainers.image.description=JBS Networks NGINX Ultra Resource-Aware Build
            org.opencontainers.image.vendor=JBS Networks

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:nginx"
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            JBS_NGINX_WORKER_PROCESSES=auto
            JBS_NGINX_WORKER_PROCESSES_MAX=8
            JBS_USE_JEMALLOC=true

          cache-from: |
            type=gha,scope=jbs-nginx-ultra-amd64
          cache-to: |
            type=gha,mode=max,scope=jbs-nginx-ultra-amd64,ignore-error=true

          provenance: false
          sbom: false
