name: JBS-Nginx-Ultra-Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'nginx/**'

jobs:
  build:
    runs-on: ubuntu-latest
    # 중요: GHCR에 이미지를 쓰기 위해 권한이 필요합니다.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          # 주소 형식: ghcr.io/아이디/이미지명:태그
          tags: ghcr.io/${{ github.repository_owner }}/jbs-nginx:ultra-4.0
