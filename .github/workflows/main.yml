name: JBS-Nginx-Ultra-Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ${{ secrets.DOCKER_USERNAME }} 부분은 깃허브가 알아서 태영님 아이디로 바꿔줍니다.
          tags: ${{ secrets.DOCKER_USERNAME }}/jbs-nginx:ultra-4.0

