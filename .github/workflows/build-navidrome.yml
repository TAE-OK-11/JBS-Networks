name: JBS-Navidrome-Ultra-Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'navidrome/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./navidrome
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jbs-navidrome:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
