name: JBS-Navidrome-Build

on:
  push:
    branches: ["main"]
    paths:
      - "navidrome/**"
      - ".github/workflows/jbs-navidrome-build.yml"
  workflow_dispatch:
    inputs:
      navidrome_ref:
        description: "Navidrome tag/branch/commit to build, e.g. v0.58.0"
        type: string
        default: "master"
      force_rebuild:
        description: "Force full rebuild (bypass cache)"
        type: boolean
        default: false

concurrency:
  group: jbs-navidrome-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jbs-navidrome
  DOCKER_BUILD_RECORD_UPLOAD: false
  DOCKER_BUILD_SUMMARY: true

  GOAMD64: v3
  GOFLAGS: "-trimpath"
  CGO_CFLAGS: "-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer"
  CGO_CXXFLAGS: "-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer"
  RUSTFLAGS: "-C target-cpu=znver3 -C opt-level=3 -C codegen-units=1"

jobs:
  build:
    name: Build and Push Navidrome
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host
          buildkitd-flags: >-
            --debug
            --allow-insecure-entitlement=security.insecure

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Navidrome ref가 tag/branch/master여도 실제 upstream commit SHA를 구함
      - name: Resolve Navidrome upstream ref
        id: navidrome_ref
        env:
          INPUT_NAVIDROME_REF: ${{ inputs.navidrome_ref }}
        run: |
          set -euo pipefail

          REMOTE="https://github.com/navidrome/navidrome.git"
          REF="${INPUT_NAVIDROME_REF:-master}"

          echo "Requested Navidrome ref: ${REF}"

          RESOLVED_REF=""
          RESOLVED_SHA=""

          # 1) 정확한 tag 확인
          if git ls-remote --exit-code --tags "$REMOTE" "refs/tags/${REF}" >/dev/null 2>&1; then
            RESOLVED_REF="${REF}"
            RESOLVED_SHA="$(git ls-remote "$REMOTE" "refs/tags/${REF}^{}" | awk '{print $1}' | tail -n1)"
            if [ -z "$RESOLVED_SHA" ]; then
              RESOLVED_SHA="$(git ls-remote "$REMOTE" "refs/tags/${REF}" | awk '{print $1}' | tail -n1)"
            fi

          # 2) v prefix 자동 보정: 0.58.0 -> v0.58.0
          elif [[ "$REF" != v* ]] && git ls-remote --exit-code --tags "$REMOTE" "refs/tags/v${REF}" >/dev/null 2>&1; then
            RESOLVED_REF="v${REF}"
            RESOLVED_SHA="$(git ls-remote "$REMOTE" "refs/tags/v${REF}^{}" | awk '{print $1}' | tail -n1)"
            if [ -z "$RESOLVED_SHA" ]; then
              RESOLVED_SHA="$(git ls-remote "$REMOTE" "refs/tags/v${REF}" | awk '{print $1}' | tail -n1)"
            fi

          # 3) branch 확인: master/main 등
          elif git ls-remote --exit-code --heads "$REMOTE" "refs/heads/${REF}" >/dev/null 2>&1; then
            RESOLVED_REF="${REF}"
            RESOLVED_SHA="$(git ls-remote "$REMOTE" "refs/heads/${REF}" | awk '{print $1}' | tail -n1)"

          # 4) commit SHA 직접 입력
          elif [[ "$REF" =~ ^[0-9a-f]{40}$ ]]; then
            RESOLVED_REF="${REF}"
            RESOLVED_SHA="${REF}"

          else
            echo "Could not resolve Navidrome ref: ${REF}" >&2
            exit 1
          fi

          echo "Resolved Navidrome ref: ${RESOLVED_REF}"
          echo "Resolved Navidrome SHA: ${RESOLVED_SHA}"

          echo "ref=${RESOLVED_REF}" >> "$GITHUB_OUTPUT"
          echo "sha=${RESOLVED_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${RESOLVED_SHA:0:12}" >> "$GITHUB_OUTPUT"

      # 버전/태그/upstream SHA/Dockerfile/workflow 변경이 전부 cache key에 들어감
      - name: Compute cache bust
        id: cache_key
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          NAVIDROME_RESOLVED_REF: ${{ steps.navidrome_ref.outputs.ref }}
          NAVIDROME_RESOLVED_SHA: ${{ steps.navidrome_ref.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ "${FORCE_REBUILD:-false}" == "true" ]]; then
            BUST="force-$(date -u +%Y%m%d%H%M%S)"
          else
            LOCAL_HASH="$(sha256sum navidrome/Dockerfile .github/workflows/jbs-navidrome-build.yml | sha256sum | awk '{print $1}')"
            BUST="navidrome-${NAVIDROME_RESOLVED_REF}-${NAVIDROME_RESOLVED_SHA}-${LOCAL_HASH}"
          fi

          echo "Cache bust: ${BUST}"
          echo "bust=${BUST}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=master-slim-v5,enable={{is_default_branch}}
            type=raw,value=navidrome-${{ steps.navidrome_ref.outputs.ref }},enable={{is_default_branch}}
            type=raw,value=upstream-${{ steps.navidrome_ref.outputs.short_sha }},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=JBS Navidrome Ultra
            org.opencontainers.image.description=JBS Networks Navidrome Ultra Slim Resource-Aware Build
            org.opencontainers.image.vendor=JBS Networks
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.navidrome_ref.outputs.ref }}
            org.opencontainers.image.source-revision=${{ steps.navidrome_ref.outputs.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: navidrome
          file: navidrome/Dockerfile
          push: true
          platforms: linux/amd64

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          pull: true
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild }}

          build-args: |
            NAVIDROME_REF=${{ steps.navidrome_ref.outputs.ref }}
            NAVIDROME_UPSTREAM_SHA=${{ steps.navidrome_ref.outputs.sha }}
            NAVIDROME_CACHEBUST=${{ steps.cache_key.outputs.bust }}
            NAVIDROME_BUILD_CORES=4
            GOAMD64_VERSION=v3
            GOFLAGS=-trimpath
            CGO_CFLAGS=-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer
            CGO_CXXFLAGS=-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer
            RUSTFLAGS=-C target-cpu=znver3 -C opt-level=3 -C codegen-units=1
            RUST_TARGET_CPU=znver3

          cache-from: |
            type=gha,scope=jbs-navidrome-build
          cache-to: |
            type=gha,mode=max,scope=jbs-navidrome-build,ignore-error=true

          provenance: false
          sbom: false

      - name: Image digest summary
        run: |
          echo "### 🐳 Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repo SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Navidrome Ref | \`${{ steps.navidrome_ref.outputs.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Navidrome Upstream SHA | \`${{ steps.navidrome_ref.outputs.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache Bust | \`${{ steps.cache_key.outputs.bust }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
