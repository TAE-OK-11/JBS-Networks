name: JBS-Navidrome-Build

on:
  push:
    branches: ["main"]
    paths:
      - "navidrome/**"
      - ".github/workflows/jbs-navidrome-build.yml"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force full rebuild (bypass cache)"
        type: boolean
        default: false

concurrency:
  group: jbs-navidrome-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # GHCR 사용 시 필요

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jbs-navidrome
  DOCKER_BUILD_RECORD_UPLOAD: false
  DOCKER_BUILD_SUMMARY: true
  # Zen3 최적화 플래그 — 빌드 전체에서 공유
  GOAMD64:        v3
  GOFLAGS:        "-trimpath"
  CGO_CFLAGS:     "-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer"
  CGO_CXXFLAGS:   "-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer"
  RUSTFLAGS:      "-C target-cpu=znver3 -C opt-level=3 -C codegen-units=1"

jobs:
  build:
    name: Build and Push Navidrome
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── 1. 소스 체크아웃 (이전 워크플로우에서 누락!) ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1          # 전체 히스토리 불필요 → 빠른 체크아웃

      # ── 2. BuildKit 최신 안정 버전 고정 ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host
          buildkitd-flags: >-
            --debug
            --allow-insecure-entitlement=security.insecure

      # ── 3. Docker Hub 로그인 ───────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 4. 캐시 무효화 키 생성 ─────────────────────────────────────────────
      #    force_rebuild 입력 또는 workflow_dispatch 시 캐시 스킵 가능
      - name: Compute cache bust
        id: cache_key
        run: |
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "bust=$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "bust=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. 메타데이터 ──────────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=master-slim-v5,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=JBS Navidrome Ultra
            org.opencontainers.image.description=JBS Networks Navidrome Ultra Slim Resource-Aware Build
            org.opencontainers.image.vendor=JBS Networks
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}

      # ── 6. 빌드 & 푸시 ────────────────────────────────────────────────────
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: navidrome          # checkout 후엔 로컬 경로 직접 지정
          file: navidrome/Dockerfile
          push: true
          platforms: linux/amd64

          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            NAVIDROME_REF=master
            NAVIDROME_CACHEBUST=${{ steps.cache_key.outputs.bust }}
            NAVIDROME_BUILD_CORES=4
            GOAMD64_VERSION=v3
            GOFLAGS=-trimpath
            CGO_CFLAGS=-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer
            CGO_CXXFLAGS=-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer
            RUSTFLAGS=-C target-cpu=znver3 -C opt-level=3 -C codegen-units=1
            RUST_TARGET_CPU=znver3

          # 계층별 캐시 스코프 분리 → 더 정밀한 캐시 히트
          cache-from: |
            type=gha,scope=jbs-navidrome-base
            type=gha,scope=jbs-navidrome-deps
            type=gha,scope=jbs-navidrome-build
          cache-to: |
            type=gha,mode=max,scope=jbs-navidrome-build,ignore-error=true

          # 빌드 시크릿 마운트 (Dockerfile에서 --mount=type=secret 사용 시)
          # secrets: |
          #   "npmrc=${{ secrets.NPMRC }}"

          provenance: false
          sbom: false

      # ── 7. 이미지 다이제스트 요약 출력 ────────────────────────────────────
      - name: Image digest summary
        run: |
          echo "### 🐳 Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA   | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags  | \`${{ steps.meta.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
