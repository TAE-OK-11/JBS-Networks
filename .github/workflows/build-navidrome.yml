name: JBS-Navidrome-Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'navidrome/**'  # navidrome 폴더 파일이 바뀔 때만 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./navidrome  # <--- 빌드 경로를 navidrome 폴더로 지정
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jbs-navidrome:latest
