name: JBS-Navidrome-Build

on:
  push:
    branches: ["main"]
    paths:
      - "navidrome/**"
      - ".github/workflows/build-navidrome.yml"
  workflow_dispatch:
    inputs:
      navidrome_repository:
        description: "Navidrome Git 저장소 URL"
        type: string
        default: "https://github.com/TAE-OK-11/navidrome.git"
      navidrome_ref:
        description: "Navidrome 버전/브랜치/SHA (예: master, 0.62.0, abc1234)"
        type: string
        default: "master"
      dockerfile_path:
        description: "사용할 Dockerfile 경로 (예: navidrome/Dockerfile)"
        type: string
        default: "navidrome/Dockerfile"
      build_context:
        description: "빌드 컨텍스트 경로 (예: navidrome)"
        type: string
        default: "navidrome"
      force_rebuild:
        description: "캐시 완전 무시하고 전체 재빌드"
        type: boolean
        default: false
      build_cores:
        description: "빌드 병렬 코어 수"
        type: string
        default: "4"

concurrency:
  group: jbs-navidrome-build-${{ github.ref }}-${{ inputs.navidrome_ref || 'auto' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME:   ${{ secrets.DOCKER_USERNAME }}/jbs-navidrome
  DOCKER_BUILD_RECORD_UPLOAD: false
  DOCKER_BUILD_SUMMARY: true

jobs:
  build:
    name: Build and Push Navidrome
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── 1. 체크아웃 ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # ── 2. 빌드 파라미터 결정 ──────────────────────────────────────────────
      - name: Resolve build parameters
        id: params
        run: |
          # ── Navidrome repository/ref ──
          ND_REPO="${{ inputs.navidrome_repository || 'https://github.com/TAE-OK-11/navidrome.git' }}"
          if [[ -n "${{ inputs.navidrome_ref }}" ]]; then
            ND_REF="${{ inputs.navidrome_ref }}"
          else
            DOCKERFILE="${{ inputs.dockerfile_path || 'navidrome/Dockerfile' }}"
            ND_REF=$(grep -m1 '^ARG NAVIDROME_REF=' "${DOCKERFILE}" \
                     | cut -d= -f2 | tr -d '"' | tr -d "'" | xargs)
            [[ -z "$ND_REF" ]] && ND_REF="master"
          fi

          # ── 캐시 키용 safe 문자열 (슬래시/콜론/퍼센트 → 하이픈) ──
          ND_REF_SAFE="${ND_REF//\//-}"
          ND_REF_SAFE="${ND_REF_SAFE//:/-}"
          ND_REF_SAFE="${ND_REF_SAFE//%/-}"

          DOCKERFILE="${{ inputs.dockerfile_path  || 'navidrome/Dockerfile' }}"
          BUILD_CTX="${{ inputs.build_context     || 'navidrome' }}"
          BUILD_CORES="${{ inputs.build_cores     || '4' }}"

          echo "nd_repo=${ND_REPO}"          >> "$GITHUB_OUTPUT"
          echo "nd_ref=${ND_REF}"            >> "$GITHUB_OUTPUT"
          echo "nd_ref_safe=${ND_REF_SAFE}"  >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}"    >> "$GITHUB_OUTPUT"
          echo "build_ctx=${BUILD_CTX}"      >> "$GITHUB_OUTPUT"
          echo "build_cores=${BUILD_CORES}"  >> "$GITHUB_OUTPUT"

          echo "### 🔧 Build Parameters"                         >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |"                                  >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|"                                  >> "$GITHUB_STEP_SUMMARY"
          echo "| NAVIDROME_REPOSITORY | \`${ND_REPO}\` |"        >> "$GITHUB_STEP_SUMMARY"
          echo "| NAVIDROME_REF | \`${ND_REF}\` |"               >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile    | \`${DOCKERFILE}\` |"           >> "$GITHUB_STEP_SUMMARY"
          echo "| Context       | \`${BUILD_CTX}\` |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Cores   | \`${BUILD_CORES}\` |"          >> "$GITHUB_STEP_SUMMARY"

      # ── 3. BuildKit 설정 & Docker Hub 로그인 (순차 — buildx가 먼저 필요) ──
      - name: Pre-pull BuildKit image
        shell: bash
        run: |
          for attempt in {1..5}; do
            if docker pull moby/buildkit:v0.31.1; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          docker pull moby/buildkit:v0.31.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.31.1
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 4. 캐시 bust 키 ────────────────────────────────────────────────────
      - name: Compute cache bust
        id: cache_key
        run: |
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "bust=$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "bust=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. 메타데이터 ──────────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ steps.params.outputs.nd_ref == 'master' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.params.outputs.nd_ref_safe }},enable=${{ steps.params.outputs.nd_ref != 'master' }}
            type=raw,value=${{ steps.params.outputs.nd_ref_safe }}-slim-v5,enable=true
          labels: |
            org.opencontainers.image.title=JBS Navidrome Ultra
            org.opencontainers.image.description=JBS Networks Navidrome Ultra Slim Resource-Aware Build
            org.opencontainers.image.vendor=JBS Networks
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}
            jbs.navidrome.ref=${{ steps.params.outputs.nd_ref }}

      # ── 6. 빌드 & 푸시 ────────────────────────────────────────────────────
      #    캐시: base/deps 스코프만 유지 (버전별 build 스코프 제거)
      #    force_rebuild=true 시 cache-from 자체를 비워서 완전 재빌드
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.params.outputs.build_ctx }}
          file:    ${{ steps.params.outputs.dockerfile }}
          push: true
          platforms: linux/amd64

          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            NAVIDROME_REF=${{ steps.params.outputs.nd_ref }}
            NAVIDROME_REPOSITORY=${{ steps.params.outputs.nd_repo }}
            NAVIDROME_CACHEBUST=${{ steps.cache_key.outputs.bust }}
            NAVIDROME_BUILD_CORES=${{ steps.params.outputs.build_cores }}
            STATIC_COMPRESSION_JOBS=${{ steps.params.outputs.build_cores }}
            GOAMD64_VERSION=v3
            RUST_TARGET_CPU=znver3

          cache-from: |
            ${{ inputs.force_rebuild != true && 'type=gha,scope=jbs-navidrome-base' || '' }}
            ${{ inputs.force_rebuild != true && 'type=gha,scope=jbs-navidrome-deps' || '' }}
          cache-to: |
            type=gha,mode=max,scope=jbs-navidrome-base,ignore-error=true
            type=gha,mode=max,scope=jbs-navidrome-deps,ignore-error=true

          # 공급망 보안: SLSA provenance + SBOM 활성화
          provenance: true
          sbom: true

      # ── 7. 빌드 요약 ───────────────────────────────────────────────────────
      - name: Image digest summary
        run: |
          echo "### 🐳 Build Complete"                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |"                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|"                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Image         | \`${{ env.IMAGE_NAME }}\` |"                     >> "$GITHUB_STEP_SUMMARY"
          echo "| Navidrome REF | \`${{ steps.params.outputs.nd_ref }}\` |"        >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile    | \`${{ steps.params.outputs.dockerfile }}\` |"    >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA    | \`${{ github.sha }}\` |"                         >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags          | \`${{ steps.meta.outputs.tags }}\` |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache Scopes  | \`jbs-navidrome-base, jbs-navidrome-deps\` |"    >> "$GITHUB_STEP_SUMMARY"
