name: JBS-Navidrome-Build

on:
  push:
    branches: ["main"]
    paths:
      - "navidrome/**"
      - ".github/workflows/jbs-navidrome-build.yml"
  workflow_dispatch:
    inputs:
      navidrome_ref:
        description: "Navidrome лІ„м „/лёҢлһңм№ҳ/SHA (мҳҲ: master, 0.62.0, abc1234)"
        type: string
        default: "master"
      dockerfile_path:
        description: "мӮ¬мҡ©н•  Dockerfile кІҪлЎң (repo кё°мӨҖ, мҳҲ: navidrome/Dockerfile)"
        type: string
        default: "navidrome/Dockerfile"
      build_context:
        description: "л№Ңл“ң м»Ён…ҚмҠӨнҠё кІҪлЎң (мҳҲ: navidrome)"
        type: string
        default: "navidrome"
      force_rebuild:
        description: "мәҗмӢң мҷ„м „ л¬ҙмӢңн•ҳкі  м „мІҙ мһ¬л№Ңл“ң"
        type: boolean
        default: false
      build_cores:
        description: "л№Ңл“ң лі‘л ¬ мҪ”м–ҙ мҲҳ"
        type: string
        default: "4"

concurrency:
  group: jbs-navidrome-build-${{ github.ref }}-${{ inputs.navidrome_ref || 'auto' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jbs-navidrome
  DOCKER_BUILD_RECORD_UPLOAD: false
  DOCKER_BUILD_SUMMARY: true
  GOAMD64:      v3
  GOFLAGS:      "-trimpath"
  CGO_CFLAGS:   "-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer"
  CGO_CXXFLAGS: "-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer"
  RUSTFLAGS:    "-C target-cpu=znver3 -C opt-level=3 -C codegen-units=1"

jobs:
  build:
    name: Build and Push Navidrome
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # в”Җв”Җ 1. мІҙнҒ¬м•„мӣғ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # в”Җв”Җ 2. л№Ңл“ң нҢҢлқјлҜён„° кІ°м • в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      #    push нҠёлҰ¬кұ° мӢң: Dockerfileмқҳ ARG NAVIDROME_REF к°’мқ„ нҢҢмӢұн•ҙм„ң мӮ¬мҡ©
      #    workflow_dispatch мӢң: мһ…л Ҙк°’ мҡ°м„ 
      - name: Resolve build parameters
        id: params
        run: |
          # в”Җв”Җ Navidrome REF в”Җв”Җ
          if [[ -n "${{ inputs.navidrome_ref }}" ]]; then
            ND_REF="${{ inputs.navidrome_ref }}"
          else
            # Dockerfileм—җм„ң ARG NAVIDROME_REF= мӨ„ нҢҢмӢұ
            DOCKERFILE="${{ inputs.dockerfile_path || 'navidrome/Dockerfile' }}"
            ND_REF=$(grep -m1 '^ARG NAVIDROME_REF=' "${DOCKERFILE}" \
                     | cut -d= -f2 | tr -d '"' | tr -d "'" | xargs)
            if [[ -z "$ND_REF" ]]; then
              ND_REF="master"
            fi
          fi

          # в”Җв”Җ мҠ¬лһҳмӢң/нҠ№мҲҳл¬ёмһҗ вҶ’ мәҗмӢң нӮӨмҡ© safe л¬ёмһҗм—ҙ ліҖнҷҳ в”Җв”Җ
          ND_REF_SAFE="${ND_REF//\//-}"
          ND_REF_SAFE="${ND_REF_SAFE//:/-}"

          # в”Җв”Җ кё°нғҖ нҢҢлқјлҜён„° в”Җв”Җ
          DOCKERFILE="${{ inputs.dockerfile_path || 'navidrome/Dockerfile' }}"
          BUILD_CTX="${{ inputs.build_context || 'navidrome' }}"
          BUILD_CORES="${{ inputs.build_cores || '4' }}"

          echo "nd_ref=${ND_REF}"            >> "$GITHUB_OUTPUT"
          echo "nd_ref_safe=${ND_REF_SAFE}"  >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}"    >> "$GITHUB_OUTPUT"
          echo "build_ctx=${BUILD_CTX}"      >> "$GITHUB_OUTPUT"
          echo "build_cores=${BUILD_CORES}"  >> "$GITHUB_OUTPUT"

          echo "### рҹ”§ Build Parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| NAVIDROME_REF | \`${ND_REF}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile    | \`${DOCKERFILE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Context       | \`${BUILD_CTX}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Cores   | \`${BUILD_CORES}\` |" >> "$GITHUB_STEP_SUMMARY"

      # в”Җв”Җ 3. BuildKit кі м • в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host
          buildkitd-flags: >-
            --debug
            --allow-insecure-entitlement=security.insecure

      # в”Җв”Җ 4. Docker Hub лЎңк·ёмқё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # в”Җв”Җ 5. мәҗмӢң bust нӮӨ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Compute cache bust
        id: cache_key
        run: |
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "bust=$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "bust=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # в”Җв”Җ 6. л©”нғҖлҚ°мқҙн„° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      #    лІ„м „лі„ нғңк·ё: latest(master), лІ„м „ кі м • нғңк·ё(non-master)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ steps.params.outputs.nd_ref == 'master' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.params.outputs.nd_ref_safe }},enable=${{ steps.params.outputs.nd_ref != 'master' }}
            type=raw,value=${{ steps.params.outputs.nd_ref_safe }}-slim-v5,enable=true
          labels: |
            org.opencontainers.image.title=JBS Navidrome Ultra
            org.opencontainers.image.description=JBS Networks Navidrome Ultra Slim Resource-Aware Build
            org.opencontainers.image.vendor=JBS Networks
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}
            jbs.navidrome.ref=${{ steps.params.outputs.nd_ref }}

      # в”Җв”Җ 7. л№Ңл“ң & н‘ёмӢң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      #    мәҗмӢң мҠӨмҪ”н”„: base/depsлҠ” лІ„м „ лҸ…лҰҪ, buildлҠ” лІ„м „лі„ л¶„лҰ¬
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.params.outputs.build_ctx }}
          file:    ${{ steps.params.outputs.dockerfile }}
          push: true
          platforms: linux/amd64

          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            NAVIDROME_REF=${{ steps.params.outputs.nd_ref }}
            NAVIDROME_CACHEBUST=${{ steps.cache_key.outputs.bust }}
            NAVIDROME_BUILD_CORES=${{ steps.params.outputs.build_cores }}
            GOAMD64_VERSION=v3
            GOFLAGS=-trimpath
            CGO_CFLAGS=-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer
            CGO_CXXFLAGS=-O3 -march=znver3 -mtune=znver3 -fomit-frame-pointer
            RUSTFLAGS=-C target-cpu=znver3 -C opt-level=3 -C codegen-units=1
            RUST_TARGET_CPU=znver3

          # лІ„м „ лҸ…лҰҪ мәҗмӢң(base/deps) + лІ„м „лі„ л№Ңл“ң мәҗмӢң л¶„лҰ¬
          cache-from: |
            type=gha,scope=jbs-navidrome-base
            type=gha,scope=jbs-navidrome-deps
            type=gha,scope=jbs-navidrome-build-${{ steps.params.outputs.nd_ref_safe }}
          cache-to: |
            type=gha,mode=max,scope=jbs-navidrome-build-${{ steps.params.outputs.nd_ref_safe }},ignore-error=true

          provenance: false
          sbom: false

      # в”Җв”Җ 8. л№Ңл“ң мҡ”м•Ҫ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Image digest summary
        run: |
          echo "### рҹҗі Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image           | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Navidrome REF   | \`${{ steps.params.outputs.nd_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile      | \`${{ steps.params.outputs.dockerfile }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA      | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags            | \`${{ steps.meta.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache Scope     | \`jbs-navidrome-build-${{ steps.params.outputs.nd_ref_safe }}\` |" >> "$GITHUB_STEP_SUMMARY"
