server {
    listen 80;
    server_name music.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen 443 quic reuseport;
    server_name music.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header X-JBS-Edge "nginx-1.30-awslc" always;

    if ($jbs_reject_0rtt) {
        return 425;
    }

    client_max_body_size 256m;

    location ~ ^/(rest/getCoverArt|api/artwork|share/.*/artwork) {
        proxy_pass http://navidrome_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Early-Data $ssl_early_data;

        proxy_cache navidrome_cache;
        proxy_cache_valid 200 301 302 24h;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache $upstream_cache_status always;
    }

    location ~ ^/(rest/stream|rest/download|stream|download) {
        proxy_pass http://navidrome_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Early-Data $ssl_early_data;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://navidrome_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Early-Data $ssl_early_data;

        proxy_buffering on;
        proxy_buffers 32 16k;
        proxy_busy_buffers_size 128k;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
