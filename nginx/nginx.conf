user nginx;
worker_processes auto;
worker_rlimit_nofile 1048576;

pid /var/run/nginx.pid;
error_log /dev/stderr warn;

# HTTP/3 note:
# Keep quic_bpf disabled by default. quic_bpf + reuseport + reload has known
# production reliability risk. Prefer full container restart after QUIC changes.


events {
    use epoll;
    worker_connections 65535;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    charset utf-8;
    max_headers 200;

    sendfile on;
    sendfile_max_chunk 2m;
    tcp_nopush on;
    tcp_nodelay on;

    aio threads;
    thread_pool default threads=32 max_queue=65536;

    keepalive_timeout 65s;
    keepalive_requests 10000;
    keepalive_min_timeout 10s;
    reset_timedout_connection on;

    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 60s;

    types_hash_max_size 4096;
    server_names_hash_bucket_size 128;

    http3 on;
    http3_stream_buffer_size 1m;
    http3_max_concurrent_streams 256;
    quic_retry on;
    quic_gso on;

    ssl_protocols TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:JBS_SSL:20m;
    ssl_session_tickets off;
    ssl_early_data on;

    map "$ssl_early_data:$request_method" $jbs_reject_0rtt {
        default 0;
        "~^1:(POST|PUT|PATCH|DELETE)$" 1;
    }

    log_format jbs_json escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"host":"$host",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"proto":"$server_protocol",'
        '"ssl":"$ssl_protocol",'
        '"early_data":"$ssl_early_data",'
        '"rt":$request_time,'
        '"urt":"$upstream_response_time",'
        '"upstream":"$upstream_addr",'
        '"cache":"$upstream_cache_status"'
      '}';

    access_log /dev/stdout jbs_json buffer=256k flush=1s;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_static on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    zstd on;
    zstd_comp_level 4;
    zstd_min_length 256;
    zstd_static on;
    zstd_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    proxy_cache_path /var/cache/nginx/navidrome levels=1:2 keys_zone=navidrome_cache:64m max_size=2g inactive=24h use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
